name: Update Calendar Events

on:
  schedule:
    - cron: '0 0 * * 1'  # 매주 월요일 00:00 UTC (한국시간 09:00)
  workflow_dispatch:       # GitHub Actions 탭에서 수동 실행 가능

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch events
        run: node scripts/fetch-events.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/events-auto.json
          git diff --staged --quiet && echo "변경사항 없음" || (
            git commit -m "chore: auto-update calendar events [skip ci]" &&
            git push
          )
